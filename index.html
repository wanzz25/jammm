```html
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GlobalTime - Jam & Cuaca Dunia</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap');

        body {
            background: radial-gradient(circle at center, #1a1a2e 0%, #0f0f1a 100%);
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
        }

        .digital-font {
            font-family: 'Orbitron', sans-serif;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1.5rem;
            transition: all 0.3s ease;
        }

        .glass-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(59, 130, 246, 0.4);
        }

        .glow-text {
            text-shadow: 0 0 15px rgba(59, 130, 246, 0.8);
        }

        .weather-badge {
            background: rgba(59, 130, 246, 0.2);
            border: 1px solid rgba(59, 130, 246, 0.3);
            border-radius: 999px;
        }

        .search-input {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            outline: none;
            transition: all 0.3s;
        }

        .search-input:focus {
            background: rgba(255, 255, 255, 0.15);
            border-color: #3b82f6;
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.3);
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0f0f1a; }
        ::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 10px; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <!-- Header & Pencarian -->
        <header class="flex flex-col md:flex-row md:items-center justify-between gap-6 mb-12">
            <div>
                <h1 class="text-4xl font-bold glow-text mb-2"><i class="fas fa-cloud-sun mr-3 text-blue-400"></i>GlobalTime</h1>
                <p class="text-gray-400">Pantau waktu dan cuaca dunia secara real-time.</p>
            </div>
            <div class="relative w-full md:w-96">
                <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                <input type="text" id="citySearch" placeholder="Cari kota..." 
                       class="search-input w-full py-3 pl-12 pr-4 rounded-xl text-white">
            </div>
        </header>

        <!-- Jam Utama (Lokal) -->
        <section class="glass-card p-8 mb-12 relative overflow-hidden">
            <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-blue-500 via-purple-500 to-pink-500"></div>
            <div class="flex flex-col md:flex-row justify-between items-center gap-6">
                <div class="text-center md:text-left">
                    <h2 class="text-xl text-blue-400 font-semibold mb-2 uppercase tracking-widest">Waktu Lokal Anda</h2>
                    <div id="localClock" class="digital-font text-6xl md:text-7xl font-bold my-2 glow-text text-blue-100">00:00:00</div>
                    <p id="localDate" class="text-lg text-gray-300">Memuat tanggal...</p>
                    <div id="localZone" class="mt-2 text-sm text-gray-500 italic">Asia/Jakarta</div>
                </div>
                <div id="localWeather" class="glass-card p-6 bg-white/5 flex flex-col items-center min-w-[150px]">
                    <i id="localWeatherIcon" class="fas fa-spinner fa-spin text-4xl text-blue-400 mb-2"></i>
                    <span id="localTemp" class="text-3xl font-bold">--°C</span>
                    <span id="localWeatherDesc" class="text-sm text-gray-400 mt-1">Memuat cuaca...</span>
                </div>
            </div>
        </section>

        <!-- Grid Jam & Cuaca Dunia -->
        <div class="mb-6 flex items-center justify-between">
            <h3 class="text-2xl font-semibold">Kota-Kota Populer</h3>
            <span class="text-xs bg-blue-600 px-3 py-1 rounded-full uppercase font-bold tracking-tighter italic">Live Sync</span>
        </div>
        
        <div id="worldClocksGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Kartu Jam akan masuk ke sini via JS -->
        </div>

        <footer class="mt-20 text-center text-gray-500 border-t border-gray-800 pt-8 pb-4">
            <p>&copy; 2024 GlobalTime Pro. Data cuaca oleh Open-Meteo.</p>
        </footer>
    </div>

    <script>
        // Daftar Kota dengan Koordinat (Lat, Long) untuk Cuaca
        const popularCities = [
            { name: "New York", zone: "America/New_York", icon: "🏙️", lat: 40.71, lon: -74.01 },
            { name: "London", zone: "Europe/London", icon: "🎡", lat: 51.51, lon: -0.13 },
            { name: "Tokyo", zone: "Asia/Tokyo", icon: "🗼", lat: 35.69, lon: 139.69 },
            { name: "Dubai", zone: "Asia/Dubai", icon: "🏨", lat: 25.21, lon: 55.27 },
            { name: "Singapore", zone: "Asia/Singapore", icon: "🦁", lat: 1.29, lon: 103.85 },
            { name: "Sydney", zone: "Australia/Sydney", icon: "🎭", lat: -33.87, lon: 151.21 },
            { name: "Paris", zone: "Europe/Paris", icon: "🥖", lat: 48.85, lon: 2.35 },
            { name: "Berlin", zone: "Europe/Berlin", icon: "🍺", lat: 52.52, lon: 13.40 },
            { name: "Moscow", zone: "Europe/Moscow", icon: "🏰", lat: 55.75, lon: 37.62 }
        ];

        // Mapping Kode Cuaca WMO ke Ikon dan Deskripsi
        const weatherMap = {
            0: { icon: "fa-sun", desc: "Cerah", color: "text-yellow-400" },
            1: { icon: "fa-cloud-sun", desc: "Cerah Berawan", color: "text-yellow-200" },
            2: { icon: "fa-cloud-sun", desc: "Berawan", color: "text-gray-300" },
            3: { icon: "fa-cloud", desc: "Mendung", color: "text-gray-400" },
            45: { icon: "fa-smog", desc: "Berkabut", color: "text-gray-400" },
            48: { icon: "fa-smog", desc: "Kabut Rime", color: "text-gray-500" },
            51: { icon: "fa-cloud-rain", desc: "Gerimis Ringan", color: "text-blue-300" },
            61: { icon: "fa-cloud-showers-heavy", desc: "Hujan", color: "text-blue-400" },
            71: { icon: "fa-snowflake", desc: "Salju", color: "text-white" },
            95: { icon: "fa-bolt", desc: "Badai Petir", color: "text-purple-400" }
        };

        function getWeatherInfo(code) {
            return weatherMap[code] || { icon: "fa-cloud", desc: "Berawan", color: "text-gray-400" };
        }

        async function fetchWeather(lat, lon, elementIdPrefix) {
            try {
                const response = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`);
                const data = await response.json();
                const weather = data.current_weather;
                const info = getWeatherInfo(weather.weathercode);

                const tempEl = document.getElementById(`${elementIdPrefix}Temp`);
                const descEl = document.getElementById(`${elementIdPrefix}Desc`);
                const iconEl = document.getElementById(`${elementIdPrefix}Icon`);

                if (tempEl) tempEl.textContent = `${Math.round(weather.temperature)}°C`;
                if (descEl) descEl.textContent = info.desc;
                if (iconEl) {
                    iconEl.className = `fas ${info.icon} ${info.color} text-4xl mb-2`;
                    if (elementIdPrefix.includes('city')) iconEl.className = `fas ${info.icon} ${info.color} text-2xl`;
                }
            } catch (error) {
                console.error("Gagal memuat cuaca", error);
            }
        }

        function formatTime(date, timeZone) {
            return new Intl.DateTimeFormat('en-GB', {
                hour: '2-digit', minute: '2-digit', second: '2-digit',
                hour12: false, timeZone: timeZone
            }).format(date);
        }

        function formatDate(date, timeZone) {
            return new Intl.DateTimeFormat('id-ID', { 
                weekday: 'long', year: 'numeric', month: 'long', day: 'numeric', timeZone: timeZone 
            }).format(date);
        }

        function updateClocks() {
            const now = new Date();
            const localZoneName = Intl.DateTimeFormat().resolvedOptions().timeZone;
            
            document.getElementById('localClock').textContent = formatTime(now, localZoneName);
            document.getElementById('localDate').textContent = formatDate(now, localZoneName);

            popularCities.forEach((city, index) => {
                const clockEl = document.getElementById(`city-time-${index}`);
                const dateEl = document.getElementById(`city-date-${index}`);
                if (clockEl) clockEl.textContent = formatTime(now, city.zone);
                if (dateEl) dateEl.textContent = formatDate(now, city.zone);
            });
        }

        function initApp() {
            const grid = document.getElementById('worldClocksGrid');
            grid.innerHTML = '';

            popularCities.forEach((city, index) => {
                const card = document.createElement('div');
                card.className = 'glass-card p-6 flex flex-col justify-between';
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-4">
                        <div class="flex-1">
                            <span class="text-3xl">${city.icon}</span>
                            <h4 class="text-xl font-bold mt-1">${city.name}</h4>
                            <p class="text-[10px] text-gray-500 uppercase tracking-widest">${city.zone}</p>
                        </div>
                        <div class="text-right">
                            <div id="city-time-${index}" class="digital-font text-2xl font-bold text-blue-400">00:00:00</div>
                            <div class="flex items-center justify-end gap-2 mt-2">
                                <i id="city-${index}Icon" class="fas fa-circle-notch fa-spin text-sm text-blue-400"></i>
                                <span id="city-${index}Temp" class="text-lg font-semibold">--°</span>
                            </div>
                        </div>
                    </div>
                    <div class="border-t border-white/10 pt-4 flex justify-between items-center">
                        <p id="city-date-${index}" class="text-xs text-gray-400">Memuat...</p>
                        <span id="city-${index}Desc" class="text-[10px] bg-white/10 px-2 py-1 rounded text-gray-300">...</span>
                    </div>
                `;
                grid.appendChild(card);
                
                // Ambil cuaca kota
                fetchWeather(city.lat, city.lon, `city-${index}`);
            });

            // Ambil cuaca lokal (Menggunakan koordinat default Jakarta jika tidak ada geolokasi)
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (pos) => fetchWeather(pos.coords.latitude, pos.coords.longitude, 'localWeather'),
                    () => fetchWeather(-6.20, 106.84, 'localWeather') // Default Jakarta
                );
            } else {
                fetchWeather(-6.20, 106.84, 'localWeather');
            }
        }

        // Pencarian
        document.getElementById('citySearch').addEventListener('input', function(e) {
            const term = e.target.value.toLowerCase();
            document.querySelectorAll('#worldClocksGrid > div').forEach((card, i) => {
                const match = popularCities[i].name.toLowerCase().includes(term);
                card.style.display = match ? 'flex' : 'none';
            });
        });

        window.onload = () => {
            initApp();
            setInterval(updateClocks, 1000);
            // Update cuaca setiap 15 menit
            setInterval(initApp, 900000);
        };
    </script>
</body>
</html>
